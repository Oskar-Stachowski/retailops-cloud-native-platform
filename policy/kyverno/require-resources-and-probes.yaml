apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: retailops-require-resources-and-probes
  annotations:
    policies.kyverno.io/title: Require resources and probes
    policies.kyverno.io/category: Reliability and Runtime Security
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-container-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Every container must define CPU/memory requests and limits."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              resources:
                requests:
                  cpu: "?*"
                  memory: "?*"
                limits:
                  cpu: "?*"
                  memory: "?*"
    - name: require-deployment-probes
      match:
        any:
          - resources:
              kinds:
                - Deployment
      validate:
        message: "Deployments must define liveness and readiness probes."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - name: "*"
                    livenessProbe: "?*"
                    readinessProbe: "?*"
