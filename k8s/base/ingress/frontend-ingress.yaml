apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retailops-frontend
  namespace: retailops
  labels:
    app.kubernetes.io/name: retailops-frontend
    app.kubernetes.io/part-of: retailops-platform
    app.kubernetes.io/component: frontend-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: retailops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: retailops-frontend
                port:
                  name: http
