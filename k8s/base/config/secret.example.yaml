apiVersion: v1
kind: Secret
metadata:
  name: retailops-runtime-secrets
  annotations:
    retailops.io/example: "true"
    retailops.io/secret-policy: "example-placeholders-only"
  namespace: retailops
  labels:
    app.kubernetes.io/name: retailops
    app.kubernetes.io/part-of: retailops-platform
    app.kubernetes.io/component: runtime-secrets
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_WITH_LOCAL_DATABASE_URL"
  POSTGRES_PASSWORD: "REPLACE_WITH_LOCAL_POSTGRES_PASSWORD"
