apiVersion: v1
kind: ConfigMap
metadata:
  name: retailops-app-config
  namespace: retailops
  labels:
    app.kubernetes.io/name: retailops
    app.kubernetes.io/part-of: retailops-platform
    app.kubernetes.io/component: runtime-config
data:
  APP_ENV: "local"
  CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173,http://retailops.local"
  RETAILOPS_BROKER_BOOTSTRAP_SERVERS: "redpanda:9092"
  RETAILOPS_BROKER_GROUP_ID: "retailops-api-consumer"
  RETAILOPS_BROKER_CLIENT_ID: "retailops-api"
