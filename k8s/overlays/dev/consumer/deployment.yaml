apiVersion: apps/v1
kind: Deployment
metadata:
  name: retailops-realtime-consumer
  labels:
    app.kubernetes.io/name: retailops-realtime-consumer
    app.kubernetes.io/part-of: retailops-platform
    app.kubernetes.io/component: realtime-consumer
    retailops.io/environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: retailops-realtime-consumer
      app.kubernetes.io/component: realtime-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retailops-realtime-consumer
        app.kubernetes.io/part-of: retailops-platform
        app.kubernetes.io/component: realtime-consumer
        retailops.io/environment: dev
    spec:
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-migrations
          image: retailops-api:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
            - |
              import os
              import time

              import psycopg

              database_url = os.environ["DATABASE_URL"]

              for _ in range(90):
                  try:
                      with psycopg.connect(database_url) as conn:
                          with conn.cursor() as cur:
                              cur.execute("SELECT version_num FROM alembic_version LIMIT 1;")
                              if cur.fetchone():
                                  raise SystemExit(0)
                  except Exception:
                      pass

                  time.sleep(2)

              raise SystemExit("Timed out waiting for Alembic migrations.")
          envFrom:
            - configMapRef:
                name: retailops-app-config
            - secretRef:
                name: retailops-runtime-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        - name: wait-for-redpanda-topics
          image: redpandadata/redpanda:v25.3.6
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e

              for _ in $(seq 1 90); do
                if rpk -X brokers=redpanda:9092 topic list | grep -q 'retailops.operations.v1'; then
                  exit 0
                fi
                sleep 2
              done

              echo "Timed out waiting for Redpanda topics."
              exit 1
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: realtime-consumer
          image: retailops-api:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - python
            - scripts/run_realtime_consumer.py
          envFrom:
            - configMapRef:
                name: retailops-app-config
            - secretRef:
                name: retailops-runtime-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          startupProbe:
            exec:
              command:
                - python
                - -c
                - |
                  from pathlib import Path

                  cmdline = Path("/proc/1/cmdline").read_bytes().decode("utf-8", "ignore")
                  raise SystemExit(0 if "run_realtime_consumer.py" in cmdline else 1)
            periodSeconds: 2
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  from pathlib import Path

                  cmdline = Path("/proc/1/cmdline").read_bytes().decode("utf-8", "ignore")
                  raise SystemExit(0 if "run_realtime_consumer.py" in cmdline else 1)
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  from pathlib import Path

                  cmdline = Path("/proc/1/cmdline").read_bytes().decode("utf-8", "ignore")
                  raise SystemExit(0 if "run_realtime_consumer.py" in cmdline else 1)
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
