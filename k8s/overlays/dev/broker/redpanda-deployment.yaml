apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/part-of: retailops-platform
    app.kubernetes.io/component: broker
    retailops.io/environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda
      app.kubernetes.io/component: broker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda
        app.kubernetes.io/part-of: retailops-platform
        app.kubernetes.io/component: broker
        retailops.io/environment: dev
    spec:
      securityContext:
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v25.3.6
          imagePullPolicy: IfNotPresent
          command:
            - redpanda
            - start
            - --smp
            - "1"
            - --memory
            - 512M
            - --reserve-memory
            - 0M
            - --overprovisioned
            - --node-id
            - "0"
            - --check=false
            - --kafka-addr
            - internal://0.0.0.0:9092
            - --advertise-kafka-addr
            - internal://redpanda:9092
            - --rpc-addr
            - 0.0.0.0:33145
            - --advertise-rpc-addr
            - redpanda:33145
            - --mode
            - dev-container
          ports:
            - name: kafka
              containerPort: 9092
              protocol: TCP
            - name: rpc
              containerPort: 33145
              protocol: TCP
            - name: admin
              containerPort: 9644
              protocol: TCP
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - rpk cluster health | grep -q 'Healthy:.*true'
            periodSeconds: 2
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - rpk cluster health | grep -q 'Healthy:.*true'
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - rpk cluster health | grep -q 'Healthy:.*true'
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
      volumes:
        - name: redpanda-data
          emptyDir: {}
