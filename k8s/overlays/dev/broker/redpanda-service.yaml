apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: retailops
  labels:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/part-of: retailops-platform
    app.kubernetes.io/component: broker
    retailops.io/environment: dev
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redpanda
    app.kubernetes.io/component: broker
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
      protocol: TCP
    - name: admin
      port: 9644
      targetPort: admin
      protocol: TCP
