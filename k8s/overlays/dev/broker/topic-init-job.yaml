apiVersion: batch/v1
kind: Job
metadata:
  name: redpanda-topic-init
  labels:
    app.kubernetes.io/name: redpanda-topic-init
    app.kubernetes.io/part-of: retailops-platform
    app.kubernetes.io/component: broker-topic-init
    retailops.io/environment: dev
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda-topic-init
        app.kubernetes.io/part-of: retailops-platform
        app.kubernetes.io/component: broker-topic-init
        retailops.io/environment: dev
    spec:
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: topic-init
          image: redpandadata/redpanda:v25.3.6
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e

              until rpk -X brokers=redpanda:9092 cluster health | grep -q 'Healthy:.*true'; do
                sleep 2
              done

              for topic in \
                retailops.sales.v1 \
                retailops.inventory.v1 \
                retailops.pricing.v1 \
                retailops.intelligence.v1 \
                retailops.operations.v1 \
                retailops.dlq.v1
              do
                rpk -X brokers=redpanda:9092 topic create "$topic" \
                  --partitions 3 \
                  --replicas 1 \
                  --if-not-exists
              done
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
