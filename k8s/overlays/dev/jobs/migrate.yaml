apiVersion: batch/v1
kind: Job
metadata:
  name: retailops-migrate
  labels:
    app.kubernetes.io/name: retailops-migrate
    app.kubernetes.io/part-of: retailops-platform
    app.kubernetes.io/component: migration
    retailops.io/environment: dev
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retailops-migrate
        app.kubernetes.io/part-of: retailops-platform
        app.kubernetes.io/component: migration
        retailops.io/environment: dev
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                sleep 2
              done
          envFrom:
            - configMapRef:
                name: retailops-db-config
            - secretRef:
                name: retailops-runtime-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: migrate
          image: retailops-api:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - alembic
            - upgrade
            - head
          envFrom:
            - configMapRef:
                name: retailops-app-config
            - secretRef:
                name: retailops-runtime-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
