apiVersion: batch/v1
kind: Job
metadata:
  name: retailops-seed-demo-data
  labels:
    app.kubernetes.io/name: retailops-seed-demo-data
    app.kubernetes.io/part-of: retailops-platform
    app.kubernetes.io/component: seed
    retailops.io/environment: dev
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retailops-seed-demo-data
        app.kubernetes.io/part-of: retailops-platform
        app.kubernetes.io/component: seed
        retailops.io/environment: dev
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                sleep 2
              done
          envFrom:
            - configMapRef:
                name: retailops-db-config
            - secretRef:
                name: retailops-runtime-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
        - name: wait-for-migrations
          image: retailops-api:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
            - |
              import os
              import time

              import psycopg

              database_url = os.environ["DATABASE_URL"]

              for _ in range(60):
                  try:
                      with psycopg.connect(database_url) as conn:
                          with conn.cursor() as cur:
                              cur.execute("SELECT version_num FROM alembic_version LIMIT 1;")
                              if cur.fetchone():
                                  raise SystemExit(0)
                  except Exception:
                      pass

                  time.sleep(2)

              raise SystemExit("Timed out waiting for Alembic migrations.")
          envFrom:
            - configMapRef:
                name: retailops-app-config
            - secretRef:
                name: retailops-runtime-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: seed
          image: retailops-api:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - python
            - scripts/seed_demo_data.py
          env:
            - name: PYTHONPATH
              value: /app
            - name: RETAILOPS_DEMO_DATA_DIR
              value: /workspace/data/demo
          envFrom:
            - configMapRef:
                name: retailops-app-config
            - secretRef:
                name: retailops-runtime-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: demo-data
              mountPath: /workspace/data/demo
              readOnly: true
      volumes:
        - name: demo-data
          configMap:
            name: retailops-demo-data
