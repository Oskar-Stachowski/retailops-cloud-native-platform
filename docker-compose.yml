services:
  frontend:
    build:
      context: ./frontend
    image: retailops-frontend:0.1.0
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./services/api
    image: retailops-api:0.1.0
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-retailops}:${POSTGRES_PASSWORD:-retailops}@db:5432/${POSTGRES_DB:-retailops}
    depends_on:
      seed:
        condition: service_completed_successfully

  migrate:
    build:
      context: ./services/api
    image: retailops-api:0.1.0
    command: ["alembic", "upgrade", "head"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-retailops}:${POSTGRES_PASSWORD:-retailops}@db:5432/${POSTGRES_DB:-retailops}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: ./services/api
    image: retailops-api:0.1.0
    command: ["python", "scripts/seed_demo_data.py"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-retailops}:${POSTGRES_PASSWORD:-retailops}@db:5432/${POSTGRES_DB:-retailops}
      PYTHONPATH: /app
      RETAILOPS_DEMO_DATA_DIR: /workspace/data/demo
    volumes:
      - ./data:/workspace/data:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retailops}
      POSTGRES_USER: ${POSTGRES_USER:-retailops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retailops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retailops} -d ${POSTGRES_DB:-retailops}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
