# RetailOps local development runtime.
#
# This Docker Compose file is intended for local development, portfolio demos,
# and CI smoke validation only. It intentionally exposes service ports on the
# host and uses simple default credentials to keep the local setup reproducible.
#
# Do not use this file as a production deployment template.
# Non-local environments must override APP_ENV and inject credentials through
# a secret manager or protected CI/CD environment variables.

# Local-only host port exposure
# -----------------------------
# The services below publish ports to the host so a reviewer can run and inspect
# the full platform locally: frontend, API, PostgreSQL, Redpanda, Prometheus,
# and Grafana.
#
# This is not a production networking model.
#
# In a production-style deployment:
# - only the public frontend/API entry point should be reachable from the internet,
# - PostgreSQL must stay in private subnets with no public host port,
# - Redpanda/Kafka must stay private to application services,
# - Prometheus and Grafana must be private, VPN-protected, or identity-protected,
# - credentials and admin passwords must come from a secret manager.

services:
  frontend:
    build:
      context: ./frontend
    image: retailops-frontend:0.1.0
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./services/api
    image: retailops-api:0.1.0
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-retailops}:${POSTGRES_PASSWORD:-retailops}@db:5432/${POSTGRES_DB:-retailops}
      RETAILOPS_BROKER_BOOTSTRAP_SERVERS: ${RETAILOPS_BROKER_BOOTSTRAP_SERVERS:-redpanda:9092}
    depends_on:
      seed:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:v3.7.3
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:9090/-/ready",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana:12.4.3
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-retailops}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana-dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  redpanda:
    image: redpandadata/redpanda:v25.3.6
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:${REDPANDA_KAFKA_PORT:-19092}
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --mode
      - dev-container
    ports:
      - "${REDPANDA_KAFKA_PORT:-19092}:19092"
      - "${REDPANDA_ADMIN_PORT:-19644}:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 12

  redpanda-init:
    image: redpandadata/redpanda:v25.3.6
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for topic in \
          retailops.sales.v1 \
          retailops.inventory.v1 \
          retailops.pricing.v1 \
          retailops.intelligence.v1 \
          retailops.operations.v1 \
          retailops.dlq.v1
        do
          rpk -X brokers=redpanda:9092 topic create "$$topic" \
            --partitions 3 \
            --replicas 1 \
            --if-not-exists
        done
    depends_on:
      redpanda:
        condition: service_healthy
    restart: "no"

  # One-shot services intentionally reuse the API image.
  # Build it first when running migration/seed jobs directly:
  #   docker compose build api
  migrate:
    image: retailops-api:0.1.0
    command: ["alembic", "upgrade", "head"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-retailops}:${POSTGRES_PASSWORD:-retailops}@db:5432/${POSTGRES_DB:-retailops}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed:
    image: retailops-api:0.1.0
    command: ["python", "scripts/seed_demo_data.py"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-retailops}:${POSTGRES_PASSWORD:-retailops}@db:5432/${POSTGRES_DB:-retailops}
      PYTHONPATH: /app
      RETAILOPS_DEMO_DATA_DIR: /workspace/data/demo
    volumes:
      - ./data:/workspace/data:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retailops}
      POSTGRES_USER: ${POSTGRES_USER:-retailops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retailops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retailops} -d ${POSTGRES_DB:-retailops}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redpanda_data:
  prometheus_data:
  grafana_data:
