services:
  frontend:
    build:
      context: ./frontend
    image: retailops-frontend:0.1.0
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - api

  api:
    build:
      context: ./services/api
    image: retailops-api:0.1.0
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://${POSTGRES_USER:-retailops}:${POSTGRES_PASSWORD:-retailops}@db:5432/${POSTGRES_DB:-retailops}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retailops}
      POSTGRES_USER: ${POSTGRES_USER:-retailops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retailops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retailops} -d ${POSTGRES_DB:-retailops}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: