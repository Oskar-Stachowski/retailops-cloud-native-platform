server {
    listen 80;

    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Common production-style browser hardening headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; connect-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" always;

    # Compress common Vite/static asset types.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # Handle the exact /api path explicitly instead of falling through to SPA index.html.
    location = /api {
        return 308 /api/;
    }

    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite emits fingerprinted files under /assets, so they can be cached aggressively.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
    }

    # SPA shell should stay fresh so it can point to the latest hashed assets.
    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
