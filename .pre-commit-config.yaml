repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: api-type-check
        name: api-type-check
        entry: make api-type-check
        language: system
        pass_filenames: false
      - id: api-security-lint
        name: api-security-lint
        entry: make api-security-lint
        language: system
        pass_filenames: false
