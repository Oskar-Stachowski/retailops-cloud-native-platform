global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    platform: retailops

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: retailops-api
    metrics_path: /metrics
    scrape_timeout: 10s
    static_configs:
      - targets:
          - api:8000
        labels:
          component: api
          service: retailops-api

  - job_name: prometheus
    metrics_path: /metrics
    scrape_timeout: 10s
    static_configs:
      - targets:
          - prometheus:9090
        labels:
          component: observability
          service: prometheus
