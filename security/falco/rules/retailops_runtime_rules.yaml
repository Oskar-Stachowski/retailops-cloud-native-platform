# RetailOps Falco runtime detection rules.
# These rules are intended for an EKS/runtime security demo and can be loaded
# together with the default Falco rules.

- list: retailops_namespaces
  items: [retailops]

- rule: RetailOps Shell Spawned In Container
  desc: Detect an interactive shell spawned inside a RetailOps container.
  condition: >
    evt.type=execve and evt.dir=< and container.id != host and
    k8s.ns.name in (retailops_namespaces) and
    proc.name in (shell_binaries)
  output: >
    RetailOps shell spawned in container
    (user=%user.name command=%proc.cmdline container=%container.name image=%container.image.repository:%container.image.tag pod=%k8s.pod.name namespace=%k8s.ns.name)
  priority: WARNING
  tags: [container, process, retailops, mitre_execution]

- rule: RetailOps Sensitive File Read
  desc: Detect reads of sensitive Linux files inside RetailOps containers.
  condition: >
    evt.type in (open, openat, openat2) and evt.dir=< and container.id != host and
    k8s.ns.name in (retailops_namespaces) and
    fd.name in (/etc/shadow, /etc/sudoers, /etc/ssh/sshd_config)
  output: >
    RetailOps sensitive file read
    (user=%user.name file=%fd.name command=%proc.cmdline container=%container.name pod=%k8s.pod.name namespace=%k8s.ns.name)
  priority: ERROR
  tags: [filesystem, container, retailops, mitre_credential_access]

- rule: RetailOps Unexpected Package Manager
  desc: Detect package manager usage inside RetailOps containers.
  condition: >
    evt.type=execve and evt.dir=< and container.id != host and
    k8s.ns.name in (retailops_namespaces) and
    proc.name in (apt, apt-get, apk, yum, dnf, rpm, dpkg, pip, npm)
  output: >
    RetailOps package manager used at runtime
    (user=%user.name command=%proc.cmdline container=%container.name pod=%k8s.pod.name namespace=%k8s.ns.name)
  priority: WARNING
  tags: [process, container, retailops, supply_chain]
