# RetailOps IaC Checkov configuration
#
# Sprint 10 policy:
# - Checkov is report-only / soft-fail at this stage.
# - Critical blockers are handled separately by grep-based guardrails in CI.
# - Findings such as missing VPC Flow Logs, custom KMS keys, alarms, dashboards,
#   or longer log retention are future hardening items, not Sprint 10 blockers.

framework:
  - terraform

directory:
  - infra

soft-fail: true
quiet: false
compact: false
download-external-modules: false

# Accepted exception:
# CKV_AWS_356 flags wildcard resources on the Terraform plan read-only
# discovery policy. The policy intentionally grants only Get/List/Describe
# actions needed by Terraform plan and does not grant create, update, delete,
# pass-role, or administrator permissions. The Makefile guardrails still block
# wildcard IAM actions and privileged policy patterns.
skip-check:
  - CKV_AWS_356
