name: Data CI

on:
  push:
    paths:
      - "data/**"
      - "events/**"
      - "scripts/data/**"
      - "services/api/requirements-dev.txt"
      - "services/api/tests/test_data_generator_cli.py"
      - "services/api/tests/test_data_contracts.py"
      - "services/api/tests/test_scenario_coverage.py"
      - "Makefile"
      - "ci-cd/README.md"
      - "docs/synthetic-data-profiles.md"
      - "docs/evidence/data/**"
      - ".github/actions/**"
      - ".github/workflows/data-ci.yml"
  pull_request:
    paths:
      - "data/**"
      - "events/**"
      - "scripts/data/**"
      - "services/api/requirements-dev.txt"
      - "services/api/tests/test_data_generator_cli.py"
      - "services/api/tests/test_data_contracts.py"
      - "services/api/tests/test_scenario_coverage.py"
      - "Makefile"
      - "ci-cd/README.md"
      - "docs/synthetic-data-profiles.md"
      - "docs/evidence/data/**"
      - ".github/actions/**"
      - ".github/workflows/data-ci.yml"
  workflow_dispatch:
    inputs:
      data_profile:
        description: "Synthetic data profile to validate."
        required: true
        type: choice
        default: small
        options:
          - small
          - medium

permissions:
  contents: read

concurrency:
  group: data-ci-${{ github.ref }}-${{ github.event.inputs.data_profile || 'small' }}
  cancel-in-progress: true

jobs:
  data-quality:
    name: Synthetic data quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATA_PROFILE: ${{ github.event.inputs.data_profile || 'small' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python for data gates
        uses: ./.github/actions/setup-python-ci
        with:
          install-command: ""

      - name: Run data readiness gates
        run: make data-generate data-quality data-contracts data-scenario-report DATA_PROFILE="${DATA_PROFILE}"

      - name: Write data CI summary
        if: always()
        run: |
          {
            echo "## Data CI evidence"
            echo ""
            echo "Profile: \`${DATA_PROFILE}\`"
            echo ""
            echo "| Evidence | Path |"
            echo "|---|---|"
            echo "| Generated dataset | \`ci-cd/reports/data/generated/${DATA_PROFILE}/\` |"
            echo "| Contract report | \`ci-cd/reports/data/data-contract-report.json\` |"
            echo "| Scenario coverage | \`ci-cd/reports/data/scenario-coverage-report.json\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload data quality evidence
        if: always()
        uses: ./.github/actions/upload-ci-evidence
        with:
          name: data-quality-${{ env.DATA_PROFILE }}-evidence
          path: |
            ci-cd/reports/data/**
            docs/evidence/data/scenario-coverage-report.md
          if-no-files-found: error
