name: API CI

on:
  push:
    paths:
      - "services/api/**"
      - "data/**"
      - "pyproject.toml"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "services/api/**"
      - "data/**"
      - "pyproject.toml"
      - ".github/workflows/api-ci.yml"

permissions:
  contents: read

jobs:
  api-integration-tests:
    name: API integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: retailops
          POSTGRES_PASSWORD: retailops
          POSTGRES_DB: retailops
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U retailops -d retailops"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://retailops:retailops@localhost:5432/retailops
      REQUIRE_DB_TESTS: "1"
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/services/api

    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            services/api/requirements.txt
            services/api/requirements-dev.txt

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Ruff checks
        working-directory: .
        run: |
          ruff check services/api data --config pyproject.toml
          ruff format --check services/api data --config pyproject.toml

      - name: Generate demo CSV dataset
        run: python -m data.generator.main
        working-directory: .

      - name: Run database migrations
        run: alembic upgrade head

      - name: Seed demo data
        run: python scripts/seed_demo_data.py

      - name: Run API tests
        run: |
          mkdir -p ../../ci-cd/reports/api
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:../../ci-cd/reports/api/coverage.xml

      - name: Upload API coverage evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-evidence
          path: ci-cd/reports/api/coverage.xml
          if-no-files-found: warn

  api-image-build:
    name: API Docker image build
    runs-on: ubuntu-latest
    needs: api-integration-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build API Docker image
        run: docker build -t retailops-api:ci services/api
