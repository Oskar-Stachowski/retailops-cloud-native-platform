name: API CI

on:
  push:
    paths:
      - "services/api/**"
      - "data/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "services/api/**"
      - "data/**"
      - ".github/workflows/api-ci.yml"

jobs:
  test-and-build-api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: retailops
          POSTGRES_PASSWORD: retailops
          POSTGRES_DB: retailops
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U retailops -d retailops"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    
    env:
      DATABASE_URL: postgresql://retailops:retailops@localhost:5432/retailops
      PYTHONPATH: .

    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/api/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      - name: Generate demo CSV dataset
        run: python -m data.generator.main
        working-directory: .
      
      - name: Run database migrations
        run: alembic upgrade head
      
      - name: Seed demo data
        run: python scripts/seed_demo_data.py

      - name: Run API tests
        run: pytest

      - name: Build API Docker image
        run: docker build -t retailops-api:ci .
