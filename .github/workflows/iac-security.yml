name: IaC Security CI

on:
  push:
    paths:
      - "infra/**"
      - "security/iac/**"
      - "Makefile"
      - ".github/actions/**"
      - ".github/workflows/iac-security.yml"
  pull_request:
    paths:
      - "infra/**"
      - "security/iac/**"
      - "Makefile"
      - ".github/actions/**"
      - ".github/workflows/iac-security.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: iac-security-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_VERSION: "1.9.8"
  IAC_REPORT_DIR: "ci-cd/reports/iac"

jobs:
  tflint:
    name: TFLint IaC quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Prepare IaC report directory
        run: mkdir -p "${IAC_REPORT_DIR}"

      - name: Show tool versions
        run: |
          terraform version
          tflint --version

      - name: Initialize TFLint plugins
        run: tflint --init --config "${GITHUB_WORKSPACE}/security/iac/tflint.hcl"

      - name: Run TFLint
        working-directory: infra
        run: |
          set -o pipefail
          tflint --recursive \
            --config "${GITHUB_WORKSPACE}/security/iac/tflint.hcl" \
            --format compact | tee "${GITHUB_WORKSPACE}/${IAC_REPORT_DIR}/tflint.txt"

      - name: Upload TFLint report
        if: always()
        uses: ./.github/actions/upload-ci-evidence
        with:
          name: iac-tflint-report
          path: ci-cd/reports/iac/tflint.txt
          if-no-files-found: warn

  checkov:
    name: Checkov IaC security report
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python and Checkov
        uses: ./.github/actions/setup-python-ci
        with:
          install-command: python -m pip install --upgrade checkov

      - name: Prepare IaC report directory
        run: mkdir -p "${IAC_REPORT_DIR}"

      - name: Run critical IaC guardrail checks
        run: make iac-critical-guardrails

      - name: Run Checkov report-only scan
        run: make checkov-report

      - name: Run Checkov JSON report
        if: always()
        run: make checkov-json

      - name: Upload Checkov reports
        if: always()
        uses: ./.github/actions/upload-ci-evidence
        with:
          name: iac-checkov-reports
          path: |
            ci-cd/reports/iac/checkov.txt
            ci-cd/reports/iac/checkov.json
          if-no-files-found: warn
