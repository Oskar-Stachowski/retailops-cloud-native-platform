name: Docker Compose CI

on:
  push:
    paths:
      - "docker-compose.yml"
      - "Makefile"
      - ".env.example"
      - "scripts/**"
      - "services/api/**"
      - "frontend/**"
      - "data/**"
      - ".github/workflows/docker-ci.yml"
  pull_request:
    paths:
      - "docker-compose.yml"
      - "Makefile"
      - ".env.example"
      - "scripts/**"
      - "services/api/**"
      - "frontend/**"
      - "data/**"
      - ".github/workflows/docker-ci.yml"

permissions:
  contents: read

jobs:
  compose-config:
    name: Validate Docker Compose config
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: make compose-config

  compose-smoke:
    name: Build full stack and run smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: compose-config

    env:
      SMOKE_MAX_ATTEMPTS: "45"
      SMOKE_SLEEP_SECONDS: "2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build, start and smoke-test full stack
        run: make compose-ci

      - name: Upload Compose evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-ci-evidence
          path: |
            ci-cd/reports/docker-compose-ps.txt
            ci-cd/reports/docker-compose-logs.txt
          if-no-files-found: ignore

      - name: Final cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true