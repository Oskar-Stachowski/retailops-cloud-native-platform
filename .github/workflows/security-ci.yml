name: Security CI

on:
  push:
    paths:
      - "services/api/**"
      - "frontend/**"
      - "data/**"
      - "docker-compose.yml"
      - "Makefile"
      - ".env.example"
      - "scripts/**"
      - "security/**"
      - ".github/workflows/security-ci.yml"
  pull_request:
    paths:
      - "services/api/**"
      - "frontend/**"
      - "data/**"
      - "docker-compose.yml"
      - "Makefile"
      - ".env.example"
      - "scripts/**"
      - "security/**"
      - ".github/workflows/security-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  REPORT_DIR: ci-cd/reports/security
  API_IMAGE: retailops-api:security
  FRONTEND_IMAGE: retailops-frontend:security

jobs:
  secret-scan:
    name: Secret scanning with Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Secret scan with Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload secret scan evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-secret-scan-evidence
          path: |
            gitleaks-results.sarif
            ci-cd/reports/security/
          if-no-files-found: ignore

  filesystem-scan:
    name: Filesystem vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table
          output: ci-cd/reports/security/trivy-fs.txt

      - name: Upload filesystem scan evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-filesystem-scan-evidence
          path: ci-cd/reports/security/trivy-fs.txt
          if-no-files-found: ignore

  python-dependency-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Set up Python for dependency audit
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Python dependency audit report
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit \
            -r services/api/requirements.txt \
            --format json \
            --output "${REPORT_DIR}/pip-audit.json"

      - name: Upload Python dependency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-python-dependency-evidence
          path: ci-cd/reports/security/pip-audit.json
          if-no-files-found: ignore

  frontend-dependency-audit:
    name: Frontend dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Set up Node.js for dependency audit
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend dependency audit report
        continue-on-error: true
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high --json > "../${REPORT_DIR}/npm-audit.json"

      - name: Upload frontend dependency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-frontend-dependency-evidence
          path: ci-cd/reports/security/npm-audit.json
          if-no-files-found: ignore

  backend-image-scan:
    name: Backend image vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Build backend image
        run: docker build -t "${API_IMAGE}" services/api

      - name: Trivy backend image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: retailops-api:security
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          output: ci-cd/reports/security/trivy-api-image.txt

      - name: Upload backend image evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-backend-image-evidence
          path: ci-cd/reports/security/trivy-api-image.txt
          if-no-files-found: ignore

  frontend-image-scan:
    name: Frontend image vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Build frontend image
        run: docker build -t "${FRONTEND_IMAGE}" frontend

      - name: Trivy frontend image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: retailops-frontend:security
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          output: ci-cd/reports/security/trivy-frontend-image.txt

      - name: Upload frontend image evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-frontend-image-evidence
          path: ci-cd/reports/security/trivy-frontend-image.txt
          if-no-files-found: ignore

  security-summary:
    name: Security evidence summary
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - filesystem-scan
      - python-dependency-audit
      - frontend-dependency-audit
      - backend-image-scan
      - frontend-image-scan
    if: always()

    steps:
      - name: Download security evidence
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: security-*-evidence
          path: ci-cd/reports/security
          merge-multiple: true

      - name: Write security summary
        run: |
          {
            echo "## Security CI summary"
            echo ""
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Secret scanning | ${{ needs.secret-scan.result }} |"
            echo "| Filesystem vulnerability scan | ${{ needs.filesystem-scan.result }} |"
            echo "| Python dependency audit | ${{ needs.python-dependency-audit.result }} |"
            echo "| Frontend dependency audit | ${{ needs.frontend-dependency-audit.result }} |"
            echo "| Backend image scan | ${{ needs.backend-image-scan.result }} |"
            echo "| Frontend image scan | ${{ needs.frontend-image-scan.result }} |"
            echo ""
            echo "Security evidence artifacts were generated during runtime."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload consolidated security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-ci-evidence
          path: ci-cd/reports/security/
          if-no-files-found: ignore
