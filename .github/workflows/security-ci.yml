name: Security CI

on:
  push:
    paths:
      - "services/api/**"
      - "frontend/**"
      - "data/**"
      - "docker-compose.yml"
      - "Makefile"
      - ".env.example"
      - "scripts/**"
      - "security/**"
      - ".gitleaks.toml"
      - ".github/actions/**"
      - ".github/workflows/security-ci.yml"
  pull_request:
    paths:
      - "services/api/**"
      - "frontend/**"
      - "data/**"
      - "docker-compose.yml"
      - "Makefile"
      - ".env.example"
      - "scripts/**"
      - "security/**"
      - ".gitleaks.toml"
      - ".github/actions/**"
      - ".github/workflows/security-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REPORT_DIR: ci-cd/reports/security
  API_IMAGE: retailops-api:security
  FRONTEND_IMAGE: retailops-frontend:security
  PIP_AUDIT_VERSION: "2.10.0"

jobs:
  secret-scan:
    name: Secret scanning with Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Secret scan with Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture Gitleaks evidence marker
        if: always()
        run: |
          {
            echo "Gitleaks job completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)."
            echo "Review the workflow log and generated SARIF output for findings."
          } > "${REPORT_DIR}/gitleaks-summary.txt"

      - name: Upload secret scan evidence
        if: always()
        uses: ./.github/actions/upload-ci-evidence
        with:
          name: security-secret-scan-evidence
          path: |
            gitleaks-results.sarif
            ci-cd/reports/security/gitleaks-summary.txt
            ci-cd/reports/security/gitleaks.json
          if-no-files-found: ignore

  filesystem-scan:
    name: Filesystem vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table
          output: ci-cd/reports/security/trivy-fs.txt

      - name: Upload filesystem scan evidence
        if: always()
        uses: ./.github/actions/upload-ci-evidence
        with:
          name: security-filesystem-scan-evidence
          path: ci-cd/reports/security/trivy-fs.txt
          if-no-files-found: warn

  python-dependency-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Set up Python dependency audit toolchain
        uses: ./.github/actions/setup-python-ci
        with:
          install-command: python -m pip install "pip-audit==${PIP_AUDIT_VERSION}"

      - name: Python dependency audit report
        continue-on-error: true
        run: |
          pip-audit \
            -r services/api/requirements.txt \
            --format json \
            --output "${REPORT_DIR}/pip-audit.json"

      - name: Upload Python dependency evidence
        if: always()
        uses: ./.github/actions/upload-ci-evidence
        with:
          name: security-python-dependency-evidence
          path: ci-cd/reports/security/pip-audit.json
          if-no-files-found: ignore

  frontend-dependency-audit:
    name: Frontend dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Set up Node.js dependency audit toolchain
        uses: ./.github/actions/setup-node-ci

      - name: Frontend dependency audit report
        continue-on-error: true
        run: |
          cd frontend
          npm audit --audit-level=high --json > "../${REPORT_DIR}/npm-audit.json"

      - name: Upload frontend dependency evidence
        if: always()
        uses: ./.github/actions/upload-ci-evidence
        with:
          name: security-frontend-dependency-evidence
          path: ci-cd/reports/security/npm-audit.json
          if-no-files-found: ignore

  backend-image-scan:
    name: Backend image vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Build backend image
        run: docker build -t "${API_IMAGE}" services/api

      - name: Trivy backend image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: retailops-api:security
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          output: ci-cd/reports/security/trivy-api-image.txt

      - name: Upload backend image evidence
        if: always()
        uses: ./.github/actions/upload-ci-evidence
        with:
          name: security-backend-image-evidence
          path: ci-cd/reports/security/trivy-api-image.txt
          if-no-files-found: warn

  frontend-image-scan:
    name: Frontend image vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Build frontend image
        run: docker build -t "${FRONTEND_IMAGE}" frontend

      - name: Trivy frontend image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: retailops-frontend:security
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          output: ci-cd/reports/security/trivy-frontend-image.txt

      - name: Upload frontend image evidence
        if: always()
        uses: ./.github/actions/upload-ci-evidence
        with:
          name: security-frontend-image-evidence
          path: ci-cd/reports/security/trivy-frontend-image.txt
          if-no-files-found: warn

  security-summary:
    name: Security evidence summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - secret-scan
      - filesystem-scan
      - python-dependency-audit
      - frontend-dependency-audit
      - backend-image-scan
      - frontend-image-scan
    if: always()

    steps:
      - name: Download security evidence
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: security-*-evidence
          path: ci-cd/reports/security
          merge-multiple: true

      - name: Write security summary
        run: |
          {
            echo "## Security CI summary"
            echo ""
            echo "| Check | Result | Evidence |"
            echo "|---|---|---|"
            echo "| Secret scanning | ${{ needs.secret-scan.result }} | \`gitleaks-results.sarif\`, \`gitleaks-summary.txt\` |"
            echo "| Filesystem vulnerability scan | ${{ needs.filesystem-scan.result }} | \`trivy-fs.txt\` |"
            echo "| Python dependency audit | ${{ needs.python-dependency-audit.result }} | \`pip-audit.json\` |"
            echo "| Frontend dependency audit | ${{ needs.frontend-dependency-audit.result }} | \`npm-audit.json\` |"
            echo "| Backend image scan | ${{ needs.backend-image-scan.result }} | \`trivy-api-image.txt\` |"
            echo "| Frontend image scan | ${{ needs.frontend-image-scan.result }} | \`trivy-frontend-image.txt\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload consolidated security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-ci-evidence
          path: ci-cd/reports/security/
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail summary if any security job failed
        if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: |
          echo "One or more security jobs failed or were cancelled."
          echo '${{ toJson(needs) }}'
          exit 1
